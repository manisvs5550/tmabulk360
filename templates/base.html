<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TMA Operations 360{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}?v=10">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#6366f1">
</head>
<body>
    <!-- Top Navbar: logo + user -->
    <nav class="dashboard-navbar" id="navbar">
        <div class="container nav-container">
            <div class="nav-left">
                <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <a href="{{ url_for('dashboard') }}" class="nav-logo">
                    <img src="{{ url_for('static', filename='images/logo.svg') }}" alt="TMA ops360" class="logo-img">
                </a>
            </div>
            <div class="nav-user-menu">
                <div class="user-info">
                    <i class="fa-solid fa-cog"></i>
                    <i class="fa-solid fa-user"></i>
                    <span>Rahul Iyer</span>
                    <i class="fa-solid fa-caret-down"></i>
                </div>
                <div class="dropdown-menu">
                    <ul>
                        <li><a href="{{ url_for('logout') }}">Logout</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <!-- Sidebar Navigation -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-nav">
            <a href="{{ url_for('dashboard') }}" class="sidebar-link{% if request.endpoint == 'dashboard' %} active{% endif %}" data-tip="Dashboard">
                <i class="fa-solid fa-house"></i><span>Dashboard</span>
            </a>
            <a href="#" class="sidebar-link" data-tip="Users">
                <i class="fa-solid fa-users"></i><span>Users</span>
            </a>
            <a href="#" class="sidebar-link" data-tip="Vessels">
                <i class="fa-solid fa-ship"></i><span>Vessels</span>
            </a>
            <a href="#" class="sidebar-link" data-tip="User Inputs">
                <i class="fa-solid fa-keyboard"></i><span>User Inputs</span>
            </a>
            <a href="#" class="sidebar-link" data-tip="AIS Data">
                <i class="fa-solid fa-satellite-dish"></i><span>AIS Data</span>
            </a>
            <a href="#" class="sidebar-link" data-tip="Track Summary">
                <i class="fa-solid fa-route"></i><span>Track Summary</span>
            </a>
            <a href="#" class="sidebar-link" data-tip="Veson Report">
                <i class="fa-solid fa-file-alt"></i><span>Veson Report</span>
            </a>
            <a href="#" class="sidebar-link" data-tip="AIS/Veson">
                <i class="fa-solid fa-chart-column"></i><span>AIS/Veson</span>
            </a>
            <a href="#" class="sidebar-link" data-tip="Hull Scales">
                <i class="fa-solid fa-anchor"></i><span>Hull Scales</span>
            </a>
            <a href="#" class="sidebar-link" data-tip="Hull Action">
                <i class="fa-solid fa-water"></i><span>Hull Action</span>
            </a>
            <a href="#" class="sidebar-link" data-tip="Overview">
                <i class="fa-solid fa-globe"></i><span>Overview</span>
            </a>
            <a href="{{ url_for('inventory') }}" class="sidebar-link{% if request.endpoint in ['inventory', 'inventory_history'] %} active{% endif %}" data-tip="Inventory">
                <i class="fa-solid fa-clipboard-list"></i><span>Inventory</span>
            </a>
        </div>
    </aside>

    {% block content %}{% endblock %}

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        const sidebar = document.getElementById('sidebar');
        const toggleBtn = document.getElementById('sidebarToggle');
        // Restore collapsed state from localStorage
        if (localStorage.getItem('sidebarCollapsed') === 'true') {
            sidebar.classList.add('collapsed');
            document.body.classList.add('sidebar-collapsed');
        }
        toggleBtn.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
            document.body.classList.toggle('sidebar-collapsed');
            localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed'));
        });
    </script>
</body>
</html>
