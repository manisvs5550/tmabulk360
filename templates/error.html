{% extends "base.html" %}
{% block title %}Error{% endblock %}

{% block content %}
<div class="page-content page-content--compact">
    <div class="container" style="max-width: 700px; margin-top: 3rem;">
        <div class="form-card" style="border-left: 4px solid #e74c3c; padding: 2rem;">
            <h3 style="color: #e74c3c; margin-bottom: 1rem;">⚠️ Error</h3>
            {% if vessel_name %}
                <p><strong>Vessel:</strong> {{ vessel_name }}</p>
            {% endif %}
            <p>{{ message }}</p>
            <div style="margin-top: 1.5rem;">
                <a href="{{ url_for('ship_performance') }}" class="btn btn-primary btn-lg">← Back to Upload</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
