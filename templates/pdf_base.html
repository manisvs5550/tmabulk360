<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Report{% endblock %} — TMA Operations 360</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; color: #334155; padding: 0; }

        /* ── Company header ── */
        .pdf-header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px 30px;
            border-bottom: 3px solid #0a1628;
            margin-bottom: 24px;
        }
        .pdf-header img {
            height: 48px;
            width: auto;
        }
        .pdf-header-text {
            display: flex;
            flex-direction: column;
        }
        .pdf-header-company {
            font-size: 1.15rem;
            font-weight: 700;
            color: #0a1628;
            letter-spacing: 0.5px;
        }
        .pdf-header-tagline {
            font-size: 0.7rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        /* ── Report title ── */
        .pdf-report-title {
            text-align: center;
            font-size: 1.4rem;
            color: #0a1628;
            margin-bottom: 4px;
        }
        .pdf-report-subtitle {
            text-align: center;
            font-size: 0.8rem;
            color: #64748b;
            margin-bottom: 20px;
        }

        /* ── Content area ── */
        .pdf-body { padding: 0 30px 30px; }

        /* ── Common table styles ── */
        h3.section-heading {
            font-size: 1rem;
            color: #0a1628;
            margin: 18px 0 8px;
            padding-bottom: 4px;
            border-bottom: 2px solid #4f46e5;
            display: inline-block;
        }
        table { width: 100%; border-collapse: collapse; margin-bottom: 16px; font-size: 0.8rem; }
        th { background: #0a1628; color: #fff; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; padding: 8px 10px; text-align: left; }
        td { padding: 6px 10px; border-bottom: 1px solid #e2e8f0; }
        tbody tr:nth-child(even) { background: #f8fafc; }

        /* ── Footer ── */
        .pdf-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.65rem;
            color: #94a3b8;
            padding: 8px 30px;
            border-top: 1px solid #e2e8f0;
        }
    </style>
    {% block extra_styles %}{% endblock %}
</head>
<body>
    <!-- Company header -->
    <div class="pdf-header">
        {% if logo_b64 %}
        <img src="data:image/png;base64,{{ logo_b64 }}" alt="TMA Logo">
        {% endif %}
        <div class="pdf-header-text">
            <span class="pdf-header-company">TMA Operations 360</span>
            <span class="pdf-header-tagline">Actionable Maritime Analytics</span>
        </div>
    </div>

    <div class="pdf-body">
        {% block report_title %}{% endblock %}
        {% block content %}{% endblock %}
    </div>

    <div class="pdf-footer">
        TMA Operations 360 &bull; Confidential &bull; Generated {{ generated_date }}
    </div>
</body>
</html>
